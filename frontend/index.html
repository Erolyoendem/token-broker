<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TokenBroker – Group Buy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }
    .container { max-width: 640px; margin: 0 auto; }
    .app-header { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #1e293b; }
    .app-header h1 { font-size: 1.5rem; color: #f1f5f9; }
    .app-header p  { font-size: 0.85rem; color: #64748b; margin-top: 0.25rem; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 1rem;
    }
    label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.3rem; }
    input, select {
      width: 100%;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 0.5rem 0.75rem;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    input:focus, select:focus { outline: 2px solid #6366f1; border-color: transparent; }

    .btn {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.25rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-full { width: 100%; }
    .btn-sm { font-size: 0.8rem; padding: 0.35rem 0.75rem; }
    .btn-outline {
      background: transparent;
      border: 1px solid #475569;
      color: #94a3b8;
    }
    .btn-outline:hover { background: #334155; color: #e2e8f0; border-color: #6366f1; }

    .status {
      font-size: 0.82rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin-top: 0.75rem;
      display: none;
    }
    .status.ok   { background: #14532d; color: #86efac; display: block; }
    .status.err  { background: #7f1d1d; color: #fca5a5; display: block; }
    .status.info { background: #1e3a5f; color: #93c5fd; display: block; }

    .progress-bar-bg {
      background: #0f172a;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #818cf8);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.4rem;
    }

    .campaign-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .campaign-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .campaign-item:hover { border-color: #6366f1; }
    .campaign-name { font-size: 0.95rem; font-weight: 600; color: #f1f5f9; margin-bottom: 0.2rem; }
    .campaign-meta { font-size: 0.78rem; color: #64748b; margin-bottom: 0.75rem; }
    .badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }
    .badge-pending { background: #422006; color: #fb923c; }
    .badge-active  { background: #14532d; color: #86efac; }

    .participants-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .participants-table th {
      text-align: left;
      color: #64748b;
      font-weight: 500;
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid #334155;
    }
    .participants-table td {
      padding: 0.45rem 0.5rem;
      color: #cbd5e1;
      border-bottom: 1px solid #1e293b;
    }
    .participants-table tr:last-child td { border-bottom: none; }
    .paid-yes { color: #86efac; }
    .paid-no  { color: #fb923c; }
    .no-participants { font-size: 0.8rem; color: #475569; padding: 0.5rem 0; }

    #payment-element {
      background: #0f172a;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      min-height: 60px;
    }
    .stripe-placeholder { font-size: 0.8rem; color: #475569; text-align: center; padding: 0.5rem 0; }

    .hidden { display: none !important; }
    .row { display: flex; gap: 0.75rem; align-items: flex-start; }
    .section-sep { border: none; border-top: 1px solid #334155; margin: 0.75rem 0; }
    .detail-kv { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .detail-kv span { font-size: 0.8rem; color: #64748b; }
    .detail-kv strong { display: block; font-size: 0.9rem; color: #e2e8f0; }
  </style>
</head>
<body>
<div class="container">

  <header class="app-header">
    <h1>TokenBroker Group Buy</h1>
    <p>Gemeinsam KI-Token guenstiger kaufen</p>
  </header>

  <!-- 1 · Config -->
  <div class="card" id="card-config">
    <p class="card-title">Verbindung</p>
    <label for="api-key">API-Key (X-TokenBroker-Key)</label>
    <input id="api-key" type="password" placeholder="tb_..." autocomplete="off" />
    <label for="base-url">Backend-URL</label>
    <input id="base-url" type="text" value="https://yondem-production.up.railway.app" />
    <button class="btn btn-full" id="btn-load">Kampagnen laden</button>
    <div class="status" id="status-load"></div>
  </div>

  <!-- 2 · Campaign list -->
  <div class="card hidden" id="card-campaigns">
    <p class="card-title">Aktive Kampagnen</p>
    <div class="campaign-list" id="campaign-list"></div>
  </div>

  <!-- 3 · Campaign detail + participants -->
  <div class="card hidden" id="card-detail">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <p class="card-title" style="margin-bottom:0">Kampagnendetails</p>
      <button class="btn btn-sm btn-outline" id="btn-back">Zurueck</button>
    </div>

    <div class="detail-kv" id="detail-kv"></div>

    <div style="margin-bottom:1rem;">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="detail-prog-fill" style="width:0%"></div>
      </div>
      <div class="progress-meta">
        <span id="detail-prog-tokens"></span>
        <span id="detail-prog-pct"></span>
      </div>
    </div>

    <hr class="section-sep" />

    <p class="card-title">Teilnehmer</p>
    <div id="participants-container"><p class="no-participants">Lade...</p></div>

    <hr class="section-sep" />

    <p class="card-title">Beitreten</p>
    <div class="row">
      <div style="flex:1">
        <label for="tokens-input">Token-Menge</label>
        <input id="tokens-input" type="number" min="1" value="10000" style="margin-bottom:0" />
      </div>
      <button class="btn" id="btn-join" style="margin-top:1.45rem">Beitreten</button>
    </div>
    <div class="status" id="status-join"></div>
  </div>

  <!-- 4 · Payment (Stripe Elements) -->
  <div class="card hidden" id="card-payment">
    <p class="card-title">Zahlung</p>
    <div id="payment-element">
      <p class="stripe-placeholder">Stripe PaymentElement wird geladen...</p>
    </div>
    <button class="btn btn-full" id="btn-pay" disabled>Jetzt bezahlen</button>
    <div class="status" id="status-pay"></div>
    <p style="font-size:0.72rem;color:#475569;margin-top:0.75rem;text-align:center;">
      Testmodus: Karte 4242&nbsp;4242&nbsp;4242&nbsp;4242 &middot; beliebiges Datum und CVC
    </p>
  </div>

</div>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const show = id => $(id).classList.remove('hidden');
const hide = id => $(id).classList.add('hidden');

function showStatus(elId, msg, type) {
  const el = $(elId);
  el.textContent = msg;
  el.className = 'status ' + (type || 'ok');
}
function getBase() { return $('base-url').value.replace(/\/$/, ''); }
function getKey()  { return $('api-key').value.trim(); }
function authHeaders(json) {
  const h = { 'X-TokenBroker-Key': getKey() };
  if (json) h['Content-Type'] = 'application/json';
  return h;
}
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let selectedCampaign = null;
let stripeInstance   = null;
let stripeElements   = null;

// ── 1. Load campaigns ──────────────────────────────────────────────────────────
$('btn-load').addEventListener('click', async () => {
  const key = getKey();
  if (!key) { showStatus('status-load', 'Bitte API-Key eingeben.', 'err'); return; }
  $('btn-load').disabled = true;
  try {
    const res = await fetch(`${getBase()}/group-buys`, { headers: authHeaders() });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const campaigns = Array.isArray(data) ? data : (data.campaigns || data.items || []);
    renderCampaignList(campaigns);
    show('card-campaigns');
    showStatus('status-load', campaigns.length + ' Kampagne(n) geladen.', 'ok');
  } catch (e) {
    showStatus('status-load', 'Fehler: ' + e.message, 'err');
  } finally {
    $('btn-load').disabled = false;
  }
});

function renderCampaignList(campaigns) {
  const list = $('campaign-list');
  list.innerHTML = '';
  if (!campaigns.length) {
    list.innerHTML = '<p class="no-participants">Keine aktiven Kampagnen.</p>';
    return;
  }
  campaigns.forEach(function(c) {
    const pct = Math.min(100, Math.round(((c.current_tokens || 0) / c.target_tokens) * 100));
    const div = document.createElement('div');
    div.className = 'campaign-item';
    div.innerHTML =
      '<div class="campaign-name">' + escHtml(c.name) +
        '<span class="badge badge-' + escHtml(c.status) + '">' + escHtml(c.status) + '</span>' +
      '</div>' +
      '<div class="campaign-meta">' + escHtml(c.provider) + ' &middot; ' + c.price_per_token.toFixed(4) + ' EUR/Token</div>' +
      '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="progress-meta">' +
        '<span>' + (c.current_tokens || 0).toLocaleString() + ' / ' + c.target_tokens.toLocaleString() + ' Token</span>' +
        '<span>' + pct + '%</span>' +
      '</div>';
    div.addEventListener('click', function() { loadCampaignDetail(c.id); });
    list.appendChild(div);
  });
}

// ── 2. Campaign detail + participants ──────────────────────────────────────────
async function loadCampaignDetail(id) {
  try {
    const res = await fetch(getBase() + '/group-buys/' + id, { headers: authHeaders() });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const c = await res.json();
    selectedCampaign = c;
    renderDetail(c);
    show('card-detail');
    $('card-detail').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (e) {
    alert('Kampagne konnte nicht geladen werden: ' + e.message);
  }
}

function renderDetail(c) {
  var expiresHtml = c.expires_at
    ? '<div><span>Laeuft ab</span><strong>' + new Date(c.expires_at).toLocaleDateString('de-DE') + '</strong></div>'
    : '';
  $('detail-kv').innerHTML =
    '<div><span>Anbieter</span><strong>' + escHtml(c.provider) + '</strong></div>' +
    '<div><span>Preis/Token</span><strong>' + c.price_per_token.toFixed(4) + ' EUR</strong></div>' +
    '<div><span>Status</span><strong><span class="badge badge-' + escHtml(c.status) + '">' + escHtml(c.status) + '</span></strong></div>' +
    expiresHtml;

  var pct = Math.min(100, Math.round(((c.current_tokens || 0) / c.target_tokens) * 100));
  $('detail-prog-fill').style.width = pct + '%';
  $('detail-prog-tokens').textContent =
    (c.current_tokens || 0).toLocaleString() + ' / ' + c.target_tokens.toLocaleString() + ' Token';
  $('detail-prog-pct').textContent = pct + '%';

  renderParticipants(c.participants || []);
}

function renderParticipants(list) {
  var el = $('participants-container');
  if (!list.length) {
    el.innerHTML = '<p class="no-participants">Noch keine Teilnehmer.</p>';
    return;
  }
  var rows = list.map(function(p) {
    var dateStr = p.created_at ? new Date(p.created_at).toLocaleDateString('de-DE') : '–';
    var paidClass = p.paid ? 'paid-yes' : 'paid-no';
    var paidLabel = p.paid ? 'Bezahlt' : 'Ausstehend';
    return '<tr>' +
      '<td>' + escHtml(p.user_id.slice(0, 8)) + '...</td>' +
      '<td>' + p.tokens_ordered.toLocaleString() + '</td>' +
      '<td class="' + paidClass + '">' + paidLabel + '</td>' +
      '<td style="color:#475569">' + dateStr + '</td>' +
      '</tr>';
  }).join('');
  el.innerHTML =
    '<table class="participants-table">' +
    '<thead><tr><th>User</th><th>Token</th><th>Zahlung</th><th>Datum</th></tr></thead>' +
    '<tbody>' + rows + '</tbody>' +
    '</table>';
}

$('btn-back').addEventListener('click', function() {
  hide('card-detail');
  hide('card-payment');
  $('card-campaigns').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// ── 3. Join ────────────────────────────────────────────────────────────────────
$('btn-join').addEventListener('click', async function() {
  if (!selectedCampaign) return;
  var tokens = parseInt($('tokens-input').value, 10);
  if (!tokens || tokens < 1) { showStatus('status-join', 'Ungueltige Token-Menge.', 'err'); return; }

  $('btn-join').disabled = true;
  showStatus('status-join', 'Beitreten...', 'info');
  try {
    var res = await fetch(getBase() + '/group-buys/' + selectedCampaign.id + '/join', {
      method: 'POST',
      headers: authHeaders(true),
      body: JSON.stringify({ tokens: tokens }),
    });
    if (!res.ok) {
      var err = await res.json().catch(function() { return {}; });
      throw new Error(err.detail || ('HTTP ' + res.status));
    }
    var updated = await res.json();
    showStatus('status-join',
      'Erfolgreich beigetreten! Stand: ' + updated.current_tokens.toLocaleString() + ' Token.', 'ok');

    var pct = Math.min(100, Math.round((updated.current_tokens / selectedCampaign.target_tokens) * 100));
    $('detail-prog-fill').style.width = pct + '%';
    $('detail-prog-tokens').textContent =
      updated.current_tokens.toLocaleString() + ' / ' + selectedCampaign.target_tokens.toLocaleString() + ' Token';
    $('detail-prog-pct').textContent = pct + '%';

    await initStripePayment(selectedCampaign.id);
  } catch (e) {
    showStatus('status-join', 'Fehler: ' + e.message, 'err');
  } finally {
    $('btn-join').disabled = false;
  }
});

// ── 4. Stripe Payment ──────────────────────────────────────────────────────────
function loadStripeJs() {
  if (window.Stripe) return Promise.resolve();
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = 'https://js.stripe.com/v3/';
    s.onload = resolve;
    s.onerror = function() { reject(new Error('Stripe.js konnte nicht geladen werden')); };
    document.head.appendChild(s);
  });
}

async function initStripePayment(groupBuyId) {
  show('card-payment');
  $('btn-pay').disabled = true;
  $('payment-element').innerHTML = '<p class="stripe-placeholder">Stripe wird initialisiert...</p>';

  try {
    var cfgRes = await fetch(getBase() + '/payment/config');
    if (!cfgRes.ok) throw new Error('Payment-Config nicht erreichbar');
    var cfg = await cfgRes.json();
    if (!cfg.publishable_key) throw new Error('STRIPE_PUBLISHABLE_KEY nicht konfiguriert');

    var intentRes = await fetch(
      getBase() + '/payment/create-intent?group_buy_id=' + groupBuyId,
      { method: 'POST', headers: authHeaders() }
    );
    if (!intentRes.ok) {
      var err = await intentRes.json().catch(function() { return {}; });
      throw new Error(err.detail || ('HTTP ' + intentRes.status));
    }
    var intent = await intentRes.json();

    await loadStripeJs();
    stripeInstance = window.Stripe(cfg.publishable_key);
    stripeElements = stripeInstance.elements({
      clientSecret: intent.client_secret,
      appearance: {
        theme: 'night',
        variables: {
          colorPrimary: '#6366f1',
          colorBackground: '#0f172a',
          colorText: '#e2e8f0',
          colorDanger: '#fca5a5',
          borderRadius: '6px',
        },
      },
    });

    var paymentEl = stripeElements.create('payment');
    $('payment-element').innerHTML = '';
    paymentEl.mount('#payment-element');
    $('btn-pay').disabled = false;
    showStatus('status-pay', 'Zahlungsformular bereit.', 'ok');
  } catch (e) {
    $('payment-element').innerHTML =
      '<p class="stripe-placeholder" style="color:#fca5a5">' + escHtml(e.message) + '</p>';
    showStatus('status-pay', 'Stripe-Fehler: ' + e.message, 'err');
  }
}

$('btn-pay').addEventListener('click', async function() {
  if (!stripeInstance || !stripeElements) return;
  $('btn-pay').disabled = true;
  showStatus('status-pay', 'Zahlung wird verarbeitet...', 'info');
  try {
    var result = await stripeInstance.confirmPayment({
      elements: stripeElements,
      confirmParams: {
        return_url: window.location.href.split('?')[0] + '?payment=success',
      },
    });
    if (result.error) throw new Error(result.error.message);
    showStatus('status-pay', 'Zahlung erfolgreich!', 'ok');
  } catch (e) {
    showStatus('status-pay', 'Fehler: ' + e.message, 'err');
    $('btn-pay').disabled = false;
  }
});

// Handle Stripe redirect return
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('payment') === 'success') {
    show('card-payment');
    $('payment-element').innerHTML = '';
    showStatus('status-pay', 'Zahlung erfolgreich abgeschlossen!', 'ok');
  }
})();
</script>
</body>
</html>
